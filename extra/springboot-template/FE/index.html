<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
</head>
<body>
    <section class="section">
        <div class="container">
            <h1 class="title">Bulma Buttons</h1>
            <!-- Colors -->
            <div class="buttons">
                <button id="btn-login" class="button is-primary">Primary</button>
                <button class="button is-link">Link</button>
                <button class="button is-info">Info</button>
                <button class="button is-success">Success</button>
                <button class="button is-warning">Warning</button>
                <button class="button is-danger">Danger</button>
            </div>
            <div class="buttons">
                <button class="button is-small">Small</button>
                <button class="button">Normal</button>
                <button class="button is-medium">Medium</button>
                <button class="button is-large">Large</button>
            </div>
            <div class="buttons">
                <button class="button is-primary is-outlined">Outlined</button>
                <button class="button is-primary is-rounded">Rounded</button>
                <button class="button is-primary is-loading">Loading</button>
                <button class="button" disabled>Disabled</button>
            </div>
        </div>
    </section>

    <script type="module" src="dist/script.js"></script>
</body>
</html>
