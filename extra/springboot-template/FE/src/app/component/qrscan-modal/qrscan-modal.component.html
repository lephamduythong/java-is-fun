<div class="modal" [class.is-active]="componentService.isQrModalVisible()">
    <div class="modal-background" (click)="close()"></div>
    <div class="modal-card">
        <header class="modal-card-head">
            <p class="modal-card-title">Quét mã QR</p>
            <button class="delete" aria-label="close" (click)="close()"></button>
        </header>
        <section class="modal-card-body" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <canvas #qrCodeEl></canvas>
            <p class="has-text-centered">Vui lòng quét mã QR trên app Google/Microsoft Authenticator.<br />
                <strong>Code này chỉ hiển thị 1 lần duy nhất.</strong>
            </p>
        </section>
        <footer class="modal-card-foot" style="justify-content: flex-end;">
            <button class="button" (click)="close()">Đóng</button>
        </footer>
    </div>
</div>
